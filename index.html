<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/hourlyForecast.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="/js/main.js" type="module" defer></script>
    <!-- <script src="/js/citySearch.js" type="module" defer></script> -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <title>Weather APP</title>
</head>
<body>
    <nav>
        <div id="menu" class="nav-container">
            <svg id="menuIcon" class="pointer" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f">
                <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
            </svg>
            <div id="menuList" class="menu activeMenu">
                <div id="popCitiesList" class="cities">
                        <h3>Popular Locations:</h3>
                        <span class="city">London</span>
                        <span class="city">Paris</span>
                        <span class="city">Stockholm</span>
                </div>
                <div class="line"></div>
                <div id="prevCitiesList" class="cities">
                        <h3>Previously Viewed:</h3>
                </div>
            </div>
        </div>

        <div id="tempToggle-btn" class="nav-container">
            <button id="celsiusBtn" class="pointer active">°C</button>
            <button id="fahrenheitBtn" class="pointer">°F</button>
        </div>
    </nav>

    <main>
        <section class="containerOne">
            <div id="selectCity">
                <div id="cityRow">
                    <div id="city">--</div>
                    <div id="location-on">
                    <svg class="pointer" xmlns="http://www.w3.org/2000/svg" height="50px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f">
                        <path d="M536.5-503.5Q560-527 560-560t-23.5-56.5Q513-640 480-640t-56.5 23.5Q400-593 400-560t23.5 56.5Q447-480 480-480t56.5-23.5ZM480-186q122-112 181-203.5T720-552q0-109-69.5-178.5T480-800q-101 0-170.5 69.5T240-552q0 71 59 162.5T480-186Z"/>
                    </svg>
                    </div>
                </div>
                <div id="current-temp">--°</div>
            </div>
            <div id="map-container">
                <div id="map"></div>
            </div>
            
        </section>

        <section class="container">
            <div id="scrollBar">
                <div id="hourlyForecast">
                    
                </div>
        </section>

        <section class="container">
            <div id="weather-details">
                <div id="selected-day"></div>
                <div id="weather-icon"></div>
                <div id="temperature"></div>
                <div id="sunrise"></div>
                <div id="sunset"></div>
                <div id="precipitation"></div>
            </div>
            <div id="days-list"></div>
            <div id="arrow-down">
                <svg class="pointer" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f">
                    <path d="M480-345 240-585l56-56 184 183 184-183 56 56-240 240Z"/>
                </svg>
            </div>
        </section>
    </main>
</body>
</html>
